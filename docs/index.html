<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Default App</title>
        <script
            type="module"
            crossorigin=""
            src="./assets/main-CAdFJqEV.js"
        ></script>
        <link
            rel="stylesheet"
            crossorigin=""
            href="./assets/main-DfBmRt1n.css"
        />
    </head>
    <body>
        <section class="temp">
            <div class="container">
                <form class="temp__wrap">
                    <h1 class="temp__title">Рандомайзер для шаблонов</h1>
                    <div class="temp__columns active">
                        <div>
                            <div class="temp__inputs">
                                <textarea
                                    class="input"
                                    placeholder="Введите название шаблонов, указанных вами в файле в фигурных скобках через Enter. Пример: temp1"
                                    rows="5"
                                    id="templates"
                                ></textarea>
                                <textarea
                                    class="input"
                                    placeholder="Введите текст, который требуется вставить в шаблоны через Enter"
                                    rows="5"
                                    id="items"
                                ></textarea>
                                <input
                                    type="number"
                                    placeholder="Число копий шаблона"
                                    class="input"
                                    min="0"
                                    max="200"
                                    id="num"
                                />
                                <input
                                    type="file"
                                    hidden=""
                                    id="file"
                                    class="input"
                                    accept=".docx"
                                />
                                <label for="file" id="fileLabel" class="input"
                                    >Файл шаблона</label
                                >
                                <select id="type" class="input input_select">
                                    <option
                                        value=""
                                        disabled="disabled"
                                        selected="selected"
                                    >
                                        Выберите тип заполнения
                                    </option>
                                    <option value="default">Стандартный</option>
                                    <option value="first">
                                        Шаблон с подписью предмета (subject),
                                        специальности (speciality), семестра
                                        (semester)
                                    </option>
                                </select>
                            </div>
                            <button
                                type="submit"
                                id="submit"
                                class="temp__submit input"
                            >
                                Сгенерировать
                            </button>
                        </div>
                        <div class="temp__additional-section">
                            <h2 class="temp__additional-title">
                                Текущий тип заполнения:
                            </h2>
                            <p class="temp__notify">
                                Используется стандартный тип
                            </p>
                            <div class="temp__type" data-type="first">
                                <div class="temp__inputs">
                                    <input
                                        id="subject"
                                        placeholder="Предмет"
                                        class="input"
                                    />
                                    <input
                                        id="speciality"
                                        placeholder="Специальность"
                                        class="input"
                                    />
                                    <input
                                        id="semester"
                                        placeholder="Семестр"
                                        class="input"
                                    />
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="temp__loading hidden">
                        <div class="loader"></div>
                    </div>
                    <div class="temp__success hidden">
                        <button class="temp__skip">+</button>
                        <h2 class="temp__title">
                            Готово! Вы можете загрузить свой файл по следующей
                            ссылке:
                        </h2>
                        <a
                            href="#"
                            download="result.zip"
                            class="temp__success-link"
                            >Загрузить</a
                        >
                    </div>
                </form>
            </div>
            <span class="temp__rights">By Temistakes</span>
        </section>
        <script src="https://unpkg.com/docxtemplater@3.68.7/build/docxtemplater.js"></script>
        <script src="https://unpkg.com/pizzip@3.2.0/dist/pizzip.js"></script>
        <script src="https://unpkg.com/pizzip@3.2.0/dist/pizzip-utils.js"></script>
        <script src="https://unpkg.com/file-saver@1.3.8/FileSaver.js"></script>
        <script
            src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"
        ></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script>
            $(() => {
                ($("#type").on("change", function (e) {
                    const t = $(e.currentTarget).val();
                    "default" !== t
                        ? ($(".temp__notify").slideUp(300),
                          $(".temp__type").not(`[data-type=${t}]`).slideUp(300),
                          $(".temp__type").removeClass("active"),
                          $(`.temp__type[data-type=${t}]`).slideDown(300),
                          $(`.temp__type[data-type=${t}]`).addClass("active"))
                        : ($(".temp__type").slideUp(300),
                          $(".temp__type").removeClass("active"),
                          $(".temp__notify").slideDown(300));
                }),
                    $(".temp__wrap").on("submit", (e) => {
                        e.preventDefault();
                    }),
                    $("#file").on("change", (e) => {
                        const t = e.currentTarget.files;
                        t.length
                            ? $("#fileLabel").text(t[0].name)
                            : $("#fileLabel").text("Файл шаблона");
                    }),
                    $("#submit").on("click", () => {
                        let e = !0,
                            t = { additional: [] };
                        if (
                            (document
                                .querySelectorAll(
                                    ".temp__inputs input, .temp__inputs textarea",
                                )
                                .forEach((n) => {
                                    e &&
                                        (n.value ||
                                            (alert("Заполнены не все поля"),
                                            (e = !1)),
                                        n.matches("#num") &&
                                            (+n.value > 200 || +n.value < 0) &&
                                            (alert(
                                                "Введено некорректное кол-во копий. Диапазон от 0 до 200",
                                            ),
                                            (e = !1)),
                                        n.matches(
                                            ".temp__additional-section .input",
                                        )
                                            ? n.matches(
                                                  ".temp__type.active .input",
                                              ) &&
                                              t.additional.push({
                                                  [n.id]: n.value,
                                              })
                                            : (t[n.id] = n.value));
                                }),
                            e)
                        ) {
                            $(".temp__loading").removeClass("hidden");
                            let e = t.items.split("\n"),
                                n = [...e],
                                a = t.templates.split("\n"),
                                l = +$("#num").val(),
                                i = t.additional,
                                o = [];
                            for (let t = 0; t < l; t++) {
                                let l = {};
                                a.forEach((a) => {
                                    const i =
                                        ((o = 0),
                                        (s = n.length - 1),
                                        Math.floor(
                                            Math.random() * (s - o + 1),
                                        ) + o);
                                    var o, s;
                                    ((l[a] = n[i]),
                                        (l.number = t + 1),
                                        n.splice(i, 1),
                                        0 === n.length && (n = [...e]));
                                });
                                let s = { ...l };
                                (i.forEach((e) => {
                                    s = { ...s, ...e };
                                }),
                                    o.push(s));
                            }
                            !(function (e) {
                                const t = new JSZip();
                                new Promise((n, a) => {
                                    e.forEach((a, l) => {
                                        const i =
                                            document.getElementById("file");
                                        ((window.generate = function () {
                                            const o = new FileReader();
                                            (o.readAsBinaryString(
                                                i.files.item(0),
                                            ),
                                                (o.onerror = function (e) {
                                                    (console.log(
                                                        "error reading file",
                                                        e,
                                                    ),
                                                        alert(
                                                            "error reading file" +
                                                                e,
                                                        ));
                                                }),
                                                (o.onload = function (i) {
                                                    const o = i.target.result,
                                                        s = new PizZip(o),
                                                        r =
                                                            new window.docxtemplater(
                                                                s,
                                                                {
                                                                    paragraphLoop:
                                                                        !0,
                                                                    linebreaks:
                                                                        !0,
                                                                },
                                                            );
                                                    (r.render(a),
                                                        r.toBlob(),
                                                        t.file(
                                                            `file${l + 1}.docx`,
                                                            r.toBlob(),
                                                        ),
                                                        l === e.length - 1 &&
                                                            n());
                                                }));
                                        }),
                                            generate());
                                    });
                                })
                                    .catch((e) => {
                                        (alert(
                                            "Произошла ошибка при генерации архива",
                                        ),
                                            $(".temp__loading").addClass(
                                                "hidden",
                                            ));
                                    })
                                    .then(() => {
                                        t.generateAsync({ type: "blob" }).then(
                                            (e) => {
                                                ($(".temp__success-link").attr(
                                                    "href",
                                                    URL.createObjectURL(e),
                                                ),
                                                    $(
                                                        ".temp__success",
                                                    ).removeClass("hidden"));
                                            },
                                        );
                                    });
                            })(o);
                        }
                    }),
                    $(".temp__skip").on("click", () => {
                        ($(".temp__success").addClass("hidden"),
                            $(".temp__loading").addClass("hidden"));
                    }));
            });
        </script>
    </body>
</html>
